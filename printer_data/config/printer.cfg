[include mainsail.cfg]
[include klackender/klackender.cfg]
[include klackender/klackender-macros.cfg]
[include macros/macros.cfg]
[include KAMP_Settings.cfg]
[include FilamentSensor.cfg]
[include start_print.cfg]

[exclude_object]

[gcode_macro FILAMENT_CHANGE]
description: Full filament change routine for Klipper
gcode:
    SAVE_GCODE_STATE NAME=FILCHANGE_state

    # Pause the print cleanly
    PAUSE

    # Lift Z to avoid blobs
    G91
    G1 Z10 F300
    G90

    # Park the nozzle
    G1 X0 Y0 F6000

    # Retract filament
    G91
    G1 E-100 F300
    G90

    RESPOND TYPE=command MSG="Filament removed. Load new filament and press RESUME."


[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_5C0027000250415339373620-if00

[probe]
pin: ^PC15 #Change to where you plug your probe in, endstop or probe pin pulled high (^)
#z_offset: 0 #Measure per your specific setup. Klipper will NOT save this value if this in not located in printer.cfg
x_offset: 4 # negative = left of the nozzle
y_offset: 21 # negative = in front of of the nozzle
speed: 5.0
lift_speed: 15.0
sample_retract_dist: 1
samples: 2
samples_tolerance_retries: 6

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 1
position_max: 320
homing_speed: 80

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
stealthchop_threshold: 999999

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_min: -17.14
position_max: 318
homing_speed: 80

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
stealthchop_threshold: 999999

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
#position_endstop: 0.0
position_min: -10
position_max: 400
homing_speed: 80



[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
stealthchop_threshold: 999999

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 4.567
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
min_temp: 0
max_temp: 400
max_extrude_only_distance: 150
max_extrude_cross_section: 5
pressure_advance: 0.04

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 0
max_temp: 130

[heater_fan heatbreak_cooling_fan]
pin: PB15

[heater_fan controller_fan]
pin: PC7

[fan]
pin: PC6

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

[mcu host]
serial: /tmp/klipper_host_mcu

[output_pin mainpower]
pin: !host:gpio17
value: 1
shutdown_value: 0

[output_pin overheadlight]
pin: !host:gpio27
value: 1
shutdown_value: 0

[gcode_macro TOGGLE_LIGHT]
gcode:
  SET_PIN PIN=overheadlight VALUE={(not printer['output_pin overheadlight'].value)|int}

[gcode_macro _POWER_OFF_OVERHEADLIGHT]
gcode:
  SET_PIN PIN=overheadlight VALUE=0



[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

