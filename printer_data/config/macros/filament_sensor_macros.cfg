# Triggered when filament sensor detects filament
[filament_switch_sensor filament_sensor]
pause_on_runout: False
switch_pin: ^PC2   # Change to your sensor pin
runout_gcode:
    M117 Filament runout detected
insert_gcode:
    M117 Filament detected - Auto loading...
    LOAD_FILAMENT

[gcode_macro LOAD_FILAMENT]
description: Automatically load filament when detected
gcode:
    M117 Heating for filament load...
    M104 S200                ; Set hotend temp (adjust for your filament)
    M109 S200                ; Wait for hotend to reach temp
    M117 Loading filament...
    G91                      ; Relative positioning
    G1 E100 F300              ; Extrude 50mm slowly to load
    G1 E10 F150              ; Extra push to ensure flow
    G90                      ; Absolute positioning
    M117 Filament loaded!

[gcode_macro UNLOAD_FILAMENT]
description: Automatically unlload filament when detected
gcode:
    M117 Heating for filament unload...
    M104 S200                ; Set hotend temp (adjust for your filament)
    M109 S200                ; Wait for hotend to reach temp
    M117 Unloading filament...
    G91                      ; Relative positioning
    G1 E-100 F300              ; Extrude 50mm slowly to load
    G1 E-10 F150              ; Extra push to ensure flow
    G90                      ; Absolute positioning
    M117 Filament unloaded!    